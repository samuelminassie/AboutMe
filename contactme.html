<!DOCTYPE html>
<html lang="en">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <head>
        <link rel="stylesheet" href="contactmestyle.css">
        <title>Contact Forms</title>
    </head>
    <body>
        <header>
            <h1>Contact Form</h1>
            <p>Fill the form to contact me!</p>
        </header>

        <main>
        <form action="" class="form-wrapper">
            <div class="individual-data">
                    <div class="row-wrapper">
                        <div class="input-wrapper">
                         <label for="fName">First Name</label>
                         <input type="text" name="" class="fName">
                        </div>
                        <div class="input-wrapper">
                         <label for="lName">Last Name</label>
                         <input type="text" name="" class="lName">                    
                        </div>
                    </div>              
                    <div class="input-wrapper phone-number-wrapper">
                    <label for="phone">Phone Number</label>
                    <input type="tel" name="phone" id="phone">
                </div>
                <div class="addr-wrapper">
					<div class="input-wrapper phone-number-wrapper">
						<label for="address">Email Address</label>
						<input type="email" name="Email" id="address">
                    </div>
                </div>
                <div class="row-wrapper">
                <div class="input-wrapper">
                    <label for="city">City</label>
                    <input type="text" name="city" id="city">
                    </div>                
                 <div class="input-wrapper">   
                    <label for="state">State</label>
                    <input type="text" name="state" id="state" required="true">
                </div>
                </div>               
                
                </div>
            </div>       

            </div>
            <div class="submit-container">
            <div class="submit">
                <button type="submit" class="submit">Submit</button>
            </div>
            </div>
        </div>
        </form>
        </main>
    </body>
</html>
